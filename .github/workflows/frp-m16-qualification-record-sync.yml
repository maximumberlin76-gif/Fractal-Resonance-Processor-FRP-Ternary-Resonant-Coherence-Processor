name: FRP M16 Qualification Record Synchronization

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frp-m16-qualification-record-sync
  cancel-in-progress: false

jobs:
  synchronize-m16-qualification-records:
    name: Synchronize M16 qualification records
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      QUALIFIED_COMMIT: ede53cfde7e087d9f98b1b9cbf2c2c5cbd3b3d7b
      TEMPORARY_WORKFLOW: .github/workflows/frp-m16-qualification-record-sync.yml

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify synchronization boundary
        shell: bash
        run: |
          set -euo pipefail

          git cat-file -e "${QUALIFIED_COMMIT}^{commit}"
          git merge-base --is-ancestor "${QUALIFIED_COMMIT}" HEAD

          mapfile -t changed_since_qualification < <(
            git diff \
              --name-only \
              "${QUALIFIED_COMMIT}..HEAD"
          )

          if [[ "${#changed_since_qualification[@]}" -ne 1 ]] \
            || [[ "${changed_since_qualification[0]}" != "${TEMPORARY_WORKFLOW}" ]]; then
            echo "Unexpected repository changes after qualified commit:"
            printf '%s\n' "${changed_since_qualification[@]}"
            exit 1
          fi

      - name: Synchronize recorded qualification values
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          current_record_files = (
              Path("README.md"),
              Path("CI.md"),
          )

          evidence_files = (
              Path("rtl/m16/SIMULATION_TRANSCRIPT.md"),
              Path("rtl/m16/CLOSURE.md"),
              Path("fpga/m16/SIMULATION_TRANSCRIPT.md"),
              Path("fpga/m16/CLOSURE.md"),
          )

          replacements = (
              (
                  "`#82`",
                  "`#84`",
                  13,
              ),
              (
                  "a68a2af",
                  "ede53cf",
                  13,
              ),
              (
                  "`#1`",
                  "`#2`",
                  13,
              ),
              (
                  "326b69e",
                  "ede53cf",
                  13,
              ),
              (
                  "1m 7s",
                  "36s",
                  8,
              ),
          )

          contents = {
              path: path.read_text(encoding="utf-8")
              for path in current_record_files
          }

          for old, new, expected_count in replacements:
              actual_count = sum(
                  text.count(old)
                  for text in contents.values()
              )

              if actual_count != expected_count:
                  raise SystemExit(
                      "Replacement count mismatch for "
                      f"{old!r}: expected {expected_count}, "
                      f"found {actual_count}"
                  )

              contents = {
                  path: text.replace(old, new)
                  for path, text in contents.items()
              }

              print(
                  f"{old!r} -> {new!r}: "
                  f"{actual_count} replacements"
              )

          prohibited_old_values = (
              "`#82`",
              "a68a2af",
              "`#1`",
              "326b69e",
              "1m 7s",
          )

          for old in prohibited_old_values:
              remaining = sum(
                  text.count(old)
                  for text in contents.values()
              )

              if remaining:
                  raise SystemExit(
                      f"Old qualification value remains: {old!r}"
                  )

          for path, text in contents.items():
              path.write_text(text, encoding="utf-8")

          rtl_rerun_record = """

          ## Qualification Rerun Record

          | Field | Recorded value |
          |---|---|
          | Workflow | `FRP M16 RTL Artifact Boundary` |
          | Workflow file | `.github/workflows/frp-m16-rtl-artifact-boundary.yml` |
          | Trigger | `workflow_dispatch` |
          | Workflow run | `#84` |
          | Qualified source commit | `ede53cf` |
          | Branch | `main` |
          | Workflow result | `SUCCESS` |
          | Workflow duration | `52s` |
          | Qualification artifact count | `1` |
          | Closure status | `M16 RTL EXECUTION LAYER CLOSED` |
          """.lstrip("\n")

          fpga_rerun_record = """

          ## Qualification Rerun Record

          | Field | Recorded value |
          |---|---|
          | Workflow | `FRP M16 FPGA Preparation` |
          | Workflow file | `.github/workflows/frp-m16-fpga-preparation.yml` |
          | Trigger | `workflow_dispatch` |
          | Workflow run | `#2` |
          | Qualified repository commit | `ede53cf` |
          | Branch | `main` |
          | Workflow result | `SUCCESS` |
          | Workflow duration | `36s` |
          | Qualification artifact count | `1` |
          | Closure status | `M16 FPGA PREPARATION LAYER CLOSED` |
          """.lstrip("\n")

          evidence_records = {
              evidence_files[0]: rtl_rerun_record,
              evidence_files[1]: rtl_rerun_record,
              evidence_files[2]: fpga_rerun_record,
              evidence_files[3]: fpga_rerun_record,
          }

          for path, record in evidence_records.items():
              text = path.read_text(encoding="utf-8")

              if "## Qualification Rerun Record" in text:
                  raise SystemExit(
                      f"Qualification rerun record already exists: {path}"
                  )

              separator = "" if text.endswith("\n") else "\n"
              path.write_text(
                  text + separator + "\n" + record,
                  encoding="utf-8",
              )

              print(f"Qualification rerun record appended: {path}")

          print("M16 qualification record synchronization: PASS")
          PY

      - name: Verify modified file boundary
        shell: bash
        run: |
          set -euo pipefail

          expected_files=(
            "CI.md"
            "README.md"
            "fpga/m16/CLOSURE.md"
            "fpga/m16/SIMULATION_TRANSCRIPT.md"
            "rtl/m16/CLOSURE.md"
            "rtl/m16/SIMULATION_TRANSCRIPT.md"
          )

          mapfile -t modified_files < <(
            git diff --name-only | sort
          )

          if [[ "${modified_files[*]}" != "${expected_files[*]}" ]]; then
            echo "Modified file boundary mismatch."
            echo "Expected:"
            printf '%s\n' "${expected_files[@]}"
            echo "Actual:"
            printf '%s\n' "${modified_files[@]}"
            exit 1
          fi

          git diff --check

      - name: Commit synchronized records and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config \
            user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            README.md \
            CI.md \
            rtl/m16/SIMULATION_TRANSCRIPT.md \
            rtl/m16/CLOSURE.md \
            fpga/m16/SIMULATION_TRANSCRIPT.md \
            fpga/m16/CLOSURE.md

          git rm "${TEMPORARY_WORKFLOW}"

          git diff --cached --check

          mapfile -t staged_files < <(
            git diff --cached --name-only | sort
          )

          expected_staged_files=(
            ".github/workflows/frp-m16-qualification-record-sync.yml"
            "CI.md"
            "README.md"
            "fpga/m16/CLOSURE.md"
            "fpga/m16/SIMULATION_TRANSCRIPT.md"
            "rtl/m16/CLOSURE.md"
            "rtl/m16/SIMULATION_TRANSCRIPT.md"
          )

          if [[ "${staged_files[*]}" != "${expected_staged_files[*]}" ]]; then
            echo "Staged file boundary mismatch."
            echo "Expected:"
            printf '%s\n' "${expected_staged_files[@]}"
            echo "Actual:"
            printf '%s\n' "${staged_files[@]}"
            exit 1
          fi

          git commit \
            -m "Synchronize M16 qualification records" \
            -m "Update current README and CI records for M16 RTL Artifact Boundary run #84 and M16 FPGA Preparation run #2 at qualified commit ede53cf. Add qualification rerun records to the M16 RTL and FPGA evidence files, retain the initial closure records, and remove the temporary synchronization workflow."

          git push origin HEAD:main
