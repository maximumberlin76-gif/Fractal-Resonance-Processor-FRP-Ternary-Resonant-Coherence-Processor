name: FRP Nonlinear Multitask Convergence Run

on:
  push:
    branches:
      - main
    paths:
      - "frp_prototype_v1_7_0.py"
      - "benchmarks/architecture_comparison/common_cost_model.py"
      - "benchmarks/architecture_comparison/common_thermal_model.py"
      - "benchmarks/architecture_comparison/profiles/thermal_proxy_profile_v1.json"
      - "benchmarks/architecture_comparison/profiles/hardware_sensitivity_cost_profile_v1.json"
      - "benchmarks/nonlinear_multitask_convergence/workloads/nonlinear_multitask_workload_v1.json"
      - "benchmarks/nonlinear_multitask_convergence/validate_nonlinear_multitask_workload.py"
      - "benchmarks/nonlinear_multitask_convergence/run_nonlinear_multitask_convergence.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_nonlinear_domain.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_nonlinear_problem.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_convergence_contract.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_thermal_ceiling.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/binary_synchronous_adapter.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/binary_clock_gated_adapter.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/direct_ternary_adapter.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/frp_v1_7_0_adapter.py"
      - ".github/workflows/frp-nonlinear-multitask-convergence-run.yml"

  pull_request:
    paths:
      - "frp_prototype_v1_7_0.py"
      - "benchmarks/architecture_comparison/common_cost_model.py"
      - "benchmarks/architecture_comparison/common_thermal_model.py"
      - "benchmarks/architecture_comparison/profiles/thermal_proxy_profile_v1.json"
      - "benchmarks/architecture_comparison/profiles/hardware_sensitivity_cost_profile_v1.json"
      - "benchmarks/nonlinear_multitask_convergence/workloads/nonlinear_multitask_workload_v1.json"
      - "benchmarks/nonlinear_multitask_convergence/validate_nonlinear_multitask_workload.py"
      - "benchmarks/nonlinear_multitask_convergence/run_nonlinear_multitask_convergence.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_nonlinear_domain.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_nonlinear_problem.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_convergence_contract.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/common_thermal_ceiling.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/binary_synchronous_adapter.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/binary_clock_gated_adapter.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/direct_ternary_adapter.py"
      - "benchmarks/nonlinear_multitask_convergence/adapters/frp_v1_7_0_adapter.py"
      - ".github/workflows/frp-nonlinear-multitask-convergence-run.yml"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: frp-nonlinear-multitask-convergence-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  canonical-run:
    name: Canonical Nonlinear Multitask Convergence Run

    runs-on: ubuntu-latest

    timeout-minutes: 360

    env:
      PYTHONHASHSEED: "0"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      LC_ALL: C.UTF-8
      TZ: UTC

    defaults:
      run:
        shell: bash
        working-directory: benchmarks/nonlinear_multitask_convergence

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show canonical run environment
        run: |
          python --version
          pwd

          test -f ../../frp_prototype_v1_7_0.py

          test -f ../architecture_comparison/common_cost_model.py
          test -f ../architecture_comparison/common_thermal_model.py
          test -f ../architecture_comparison/profiles/thermal_proxy_profile_v1.json
          test -f ../architecture_comparison/profiles/hardware_sensitivity_cost_profile_v1.json

          test -f workloads/nonlinear_multitask_workload_v1.json
          test -f validate_nonlinear_multitask_workload.py
          test -f run_nonlinear_multitask_convergence.py

          test -f adapters/common_nonlinear_domain.py
          test -f adapters/common_nonlinear_problem.py
          test -f adapters/common_convergence_contract.py
          test -f adapters/common_thermal_ceiling.py
          test -f adapters/binary_synchronous_adapter.py
          test -f adapters/binary_clock_gated_adapter.py
          test -f adapters/direct_ternary_adapter.py
          test -f adapters/frp_v1_7_0_adapter.py

      - name: Compile complete nonlinear multitask execution chain
        run: |
          python -m py_compile \
            validate_nonlinear_multitask_workload.py \
            run_nonlinear_multitask_convergence.py \
            adapters/common_nonlinear_domain.py \
            adapters/common_nonlinear_problem.py \
            adapters/common_convergence_contract.py \
            adapters/common_thermal_ceiling.py \
            adapters/binary_synchronous_adapter.py \
            adapters/binary_clock_gated_adapter.py \
            adapters/direct_ternary_adapter.py \
            adapters/frp_v1_7_0_adapter.py \
            ../architecture_comparison/common_cost_model.py \
            ../architecture_comparison/common_thermal_model.py \
            ../../frp_prototype_v1_7_0.py

      - name: Create run directories
        run: |
          mkdir -p results
          mkdir -p .qualification

      - name: Validate canonical workload contract
        run: |
          python validate_nonlinear_multitask_workload.py \
            --profile workloads/nonlinear_multitask_workload_v1.json \
            --output text

      - name: Run workload validator self-test
        run: |
          python validate_nonlinear_multitask_workload.py \
            --profile workloads/nonlinear_multitask_workload_v1.json \
            --self-test \
            --output text

      - name: Run complete common-model and adapter self-test chain
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          root = Path.cwd()
          adapters = root / "adapters"

          sys.path.insert(0, str(adapters))
          sys.path.insert(0, str(root))

          from validate_nonlinear_multitask_workload import load_json_object
          from common_nonlinear_domain import run_self_test as domain_self_test
          from common_nonlinear_problem import run_self_test as problem_self_test
          from common_convergence_contract import run_self_test as convergence_self_test
          from common_thermal_ceiling import run_self_test as thermal_self_test
          from binary_synchronous_adapter import run_self_test as binary_sync_self_test
          from binary_clock_gated_adapter import run_self_test as binary_gated_self_test
          from direct_ternary_adapter import run_self_test as direct_ternary_self_test
          from frp_v1_7_0_adapter import run_self_test as frp_self_test

          profile = load_json_object(
              root / "workloads/nonlinear_multitask_workload_v1.json",
              "nonlinear multitask workload profile",
          )

          repository_root = root.parents[1]

          checks = {
              "common_nonlinear_domain": domain_self_test(profile),
              "common_nonlinear_problem": problem_self_test(profile),
              "common_convergence_contract": convergence_self_test(profile),
              "common_thermal_ceiling": thermal_self_test(profile, repository_root),
              "binary_synchronous_adapter": binary_sync_self_test(profile),
              "binary_clock_gated_adapter": binary_gated_self_test(profile),
              "direct_ternary_adapter": direct_ternary_self_test(profile),
              "frp_v1_7_0_adapter": frp_self_test(profile),
          }

          assert all(
              result["status"] == "PASS"
              for result in checks.values()
          )

          assert checks["frp_v1_7_0_adapter"]["actual_direct_events"] == 0
          assert checks["frp_v1_7_0_adapter"]["reserved_state_events"] == 0
          assert checks["frp_v1_7_0_adapter"]["queue_overflow_events"] == 0

          output = {
              "status": "PASS",
              "check_count": len(checks),
              "checks": checks,
          }

          Path(
              ".qualification/"
              "nonlinear_multitask_execution_chain_self_tests.json"
          ).write_text(
              json.dumps(
                  output,
                  ensure_ascii=False,
                  sort_keys=True,
                  indent=2,
                  allow_nan=False,
              )
              + "\n",
              encoding="utf-8",
          )

          print("nonlinear multitask execution chain self-tests: PASS")
          print(f"check_count={len(checks)}")
          PY

      - name: Run canonical runner self-test
        run: |
          python run_nonlinear_multitask_convergence.py \
            --profile workloads/nonlinear_multitask_workload_v1.json \
            --self-test \
            --json \
            > .qualification/nonlinear_multitask_runner_self_test.json

          cat .qualification/nonlinear_multitask_runner_self_test.json

      - name: Verify canonical runner self-test
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              ".qualification/"
              "nonlinear_multitask_runner_self_test.json"
          )

          result = json.loads(
              path.read_text(
                  encoding="utf-8"
              )
          )

          expected_architecture_order = [
              "binary_synchronous_reference",
              "binary_clock_gated_reference",
              "direct_ternary_reference",
              "frp_v1_7_0_quantized_shadow",
          ]

          assert result["status"] == "PASS"
          assert result["scheduler_mode"] == "free"
          assert result["architecture_order"] == expected_architecture_order
          assert result["winner_assertions"] == []
          assert result["repeated_probe_byte_identical"] is True
          assert len(result["workload_profile_sha256"]) == 64
          assert len(result["integration_probe_sha256"]) == 64
          assert len(result["runner_self_test_sha256"]) == 64

          print("nonlinear multitask runner self-test qualification: PASS")
          PY

      - name: Generate canonical nonlinear multitask result
        run: |
          python run_nonlinear_multitask_convergence.py \
            --profile workloads/nonlinear_multitask_workload_v1.json \
            --output results/reference_nonlinear_multitask_seed_76.json \
            --json \
            > .qualification/nonlinear_multitask_full_run_first_summary.json

          cat .qualification/nonlinear_multitask_full_run_first_summary.json

      - name: Regenerate canonical nonlinear multitask result independently
        run: |
          python run_nonlinear_multitask_convergence.py \
            --profile workloads/nonlinear_multitask_workload_v1.json \
            --output .qualification/reference_nonlinear_multitask_seed_76_repeat.json \
            --json \
            > .qualification/nonlinear_multitask_full_run_repeat_summary.json

          cat .qualification/nonlinear_multitask_full_run_repeat_summary.json

      - name: Verify byte-identical deterministic canonical result
        run: |
          cmp \
            results/reference_nonlinear_multitask_seed_76.json \
            .qualification/reference_nonlinear_multitask_seed_76_repeat.json

      - name: Verify canonical nonlinear multitask result package
        run: |
          python - <<'PY'
          import hashlib
          import itertools
          import json
          import math
          from pathlib import Path

          result_path = Path(
              "results/"
              "reference_nonlinear_multitask_seed_76.json"
          )

          repeat_path = Path(
              ".qualification/"
              "reference_nonlinear_multitask_seed_76_repeat.json"
          )

          workload_path = Path(
              "workloads/"
              "nonlinear_multitask_workload_v1.json"
          )

          first_summary_path = Path(
              ".qualification/"
              "nonlinear_multitask_full_run_first_summary.json"
          )

          repeat_summary_path = Path(
              ".qualification/"
              "nonlinear_multitask_full_run_repeat_summary.json"
          )

          result = json.loads(
              result_path.read_text(
                  encoding="utf-8"
              )
          )

          repeat = json.loads(
              repeat_path.read_text(
                  encoding="utf-8"
              )
          )

          workload = json.loads(
              workload_path.read_text(
                  encoding="utf-8"
              )
          )

          first_summary = json.loads(
              first_summary_path.read_text(
                  encoding="utf-8"
              )
          )

          repeat_summary = json.loads(
              repeat_summary_path.read_text(
                  encoding="utf-8"
              )
          )

          expected_architecture_order = [
              "binary_synchronous_reference",
              "binary_clock_gated_reference",
              "direct_ternary_reference",
              "frp_v1_7_0_quantized_shadow",
          ]

          expected_case_tuples = list(
              itertools.product(
                  [8, 16, 32],
                  [1, 2, 4, 8],
                  ["low", "medium", "high"],
              )
          )

          assert result == repeat

          assert first_summary["status"] == "GENERATED"
          assert repeat_summary["status"] == "GENERATED"
          assert first_summary["case_count"] == 36
          assert repeat_summary["case_count"] == 36
          assert first_summary["architecture_case_count"] == 144
          assert repeat_summary["architecture_case_count"] == 144
          assert first_summary["scheduler_mode"] == "free"
          assert repeat_summary["scheduler_mode"] == "free"
          assert first_summary["package_sha256"] == result["package_sha256"]
          assert repeat_summary["package_sha256"] == result["package_sha256"]
          assert first_summary["winner_assertions"] == []
          assert repeat_summary["winner_assertions"] == []

          assert (
              result["schema"]
              == "frp.benchmark."
              "nonlinear_multitask_convergence_result.v1"
          )

          assert (
              result["benchmark_id"]
              == "nonlinear_multitask_"
              "phase_coherence_convergence_v1"
          )

          assert result["seed"] == 76
          assert result["scheduler_mode"] == "free"
          assert result["scheduler_7_1_enabled"] is False
          assert result["scheduler_1_7_enabled"] is False
          assert result["architecture_order"] == expected_architecture_order
          assert result["case_count"] == 36
          assert result["architecture_case_count"] == 144
          assert result["ranking"] is None
          assert result["winner_assertions"] == []

          assert (
              result["workload_profile_sha256"]
              == workload["workload_profile_sha256"]
          )

          assert len(result["cases"]) == 36
          assert len(result["architecture_summary"]) == 4

          assert (
              [
                  row["architecture_id"]
                  for row in result["architecture_summary"]
              ]
              == expected_architecture_order
          )

          observed_case_tuples = [
              (
                  case["domain_size"],
                  case["concurrent_domain_count"],
                  case["nonlinearity_class"],
              )
              for case in result["cases"]
          ]

          assert observed_case_tuples == expected_case_tuples

          architecture_case_count = 0
          frp_case_count = 0

          for case_index, case in enumerate(result["cases"]):
              expected_domain_size, expected_concurrency, expected_class = (
                  expected_case_tuples[case_index]
              )

              assert case["case_index"] == case_index
              assert case["domain_size"] == expected_domain_size
              assert case["concurrent_domain_count"] == expected_concurrency
              assert case["nonlinearity_class"] == expected_class
              assert case["winner_assertions"] == []
              assert len(case["architectures"]) == 4

              assert (
                  [
                      row["architecture_id"]
                      for row in case["architectures"]
                  ]
                  == expected_architecture_order
              )

              for architecture in case["architectures"]:
                  architecture_case_count += 1

                  assert architecture["scheduler_mode"] == "free"
                  assert architecture["winner_assertions"] == []

                  assert (
                      architecture["ranking_eligibility"]["winner_assertions"]
                      == []
                  )

                  completion = float(
                      architecture["secondary_metrics"][
                          "semantic_completion_ratio"
                      ]
                  )

                  output_match = float(
                      architecture["secondary_metrics"][
                          "semantic_output_match"
                      ]
                  )

                  assert math.isfinite(completion)
                  assert math.isfinite(output_match)
                  assert 0.0 <= completion <= 1.0
                  assert 0.0 <= output_match <= 1.0

                  thermal_status = architecture["secondary_metrics"][
                      "thermal_ceiling_status"
                  ]

                  assert thermal_status in {
                      "within_ceiling",
                      "throttled",
                      "ceiling_violation",
                  }

                  assert (
                      architecture["raw_architecture_trace_sha256"]
                      == hashlib.sha256(
                          json.dumps(
                              architecture["raw_architecture_trace"],
                              ensure_ascii=False,
                              sort_keys=True,
                              separators=(",", ":"),
                              allow_nan=False,
                          ).encode("utf-8")
                      ).hexdigest()
                  )

                  architecture_digest = architecture[
                      "architecture_case_result_sha256"
                  ]

                  architecture_payload = dict(
                      architecture
                  )

                  del architecture_payload[
                      "architecture_case_result_sha256"
                  ]

                  assert architecture_digest == hashlib.sha256(
                      json.dumps(
                          architecture_payload,
                          ensure_ascii=False,
                          sort_keys=True,
                          separators=(",", ":"),
                          allow_nan=False,
                      ).encode("utf-8")
                  ).hexdigest()

                  if (
                      architecture["architecture_id"]
                      == "frp_v1_7_0_quantized_shadow"
                  ):
                      frp_case_count += 1

                      invariants = architecture[
                          "frp_invariants"
                      ]

                      assert invariants is not None
                      assert invariants["actual_direct_events"] == 0
                      assert invariants["reserved_state_events"] == 0
                      assert invariants["queue_overflow_events"] == 0
                      assert invariants["pending_route_count_final"] == 0
                      assert invariants["transition_fraction"] == 0.25

                      assert invariants["mandatory_routes"] == [
                          "-1 -> 0 -> 1",
                          "1 -> 0 -> -1",
                      ]

                      assert (
                          invariants["tick_separated_neutral_route"]
                          is True
                      )

                      assert invariants["scheduler_mode"] == "free"

                      assert (
                          invariants["all_required_invariants_ok"]
                          is True
                      )

                      invariant_digest = invariants[
                          "frp_invariant_package_sha256"
                      ]

                      invariant_payload = dict(
                          invariants
                      )

                      del invariant_payload[
                          "frp_invariant_package_sha256"
                      ]

                      assert invariant_digest == hashlib.sha256(
                          json.dumps(
                              invariant_payload,
                              ensure_ascii=False,
                              sort_keys=True,
                              separators=(",", ":"),
                              allow_nan=False,
                          ).encode("utf-8")
                      ).hexdigest()

              case_digest = case[
                  "case_result_sha256"
              ]

              case_payload = dict(
                  case
              )

              del case_payload[
                  "case_result_sha256"
              ]

              assert case_digest == hashlib.sha256(
                  json.dumps(
                      case_payload,
                      ensure_ascii=False,
                      sort_keys=True,
                      separators=(",", ":"),
                      allow_nan=False,
                  ).encode("utf-8")
              ).hexdigest()

          assert architecture_case_count == 144
          assert frp_case_count == 36

          source_bindings = result[
              "source_bindings"
          ]

          source_binding_digest = source_bindings[
              "source_binding_package_sha256"
          ]

          source_binding_payload = dict(
              source_bindings
          )

          del source_binding_payload[
              "source_binding_package_sha256"
          ]

          assert source_binding_digest == hashlib.sha256(
              json.dumps(
                  source_binding_payload,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
                  allow_nan=False,
              ).encode("utf-8")
          ).hexdigest()

          assert all(
              len(row["sha256"]) == 64
              for row in source_bindings["files"]
          )

          recorded_package_digest = result[
              "package_sha256"
          ]

          package_payload = dict(
              result
          )

          del package_payload[
              "package_sha256"
          ]

          recomputed_package_digest = hashlib.sha256(
              json.dumps(
                  package_payload,
                  ensure_ascii=False,
                  sort_keys=True,
                  separators=(",", ":"),
                  allow_nan=False,
              ).encode("utf-8")
          ).hexdigest()

          assert (
              recorded_package_digest
              == recomputed_package_digest
          )

          print(
              "canonical nonlinear multitask "
              "result qualification: PASS"
          )

          print(
              f"case_count={result['case_count']}"
          )

          print(
              f"architecture_case_count={architecture_case_count}"
          )

          print(
              f"frp_case_count={frp_case_count}"
          )

          print(
              f"scheduler_mode={result['scheduler_mode']}"
          )

          print(
              f"package_sha256={recorded_package_digest}"
          )
          PY

      - name: Verify canonical run changed no source files
        run: |
          unexpected="$({
            git diff --name-only
          } | grep -v '^benchmarks/nonlinear_multitask_convergence/results/reference_nonlinear_multitask_seed_76.json$' || true)"

          if [ -n "$unexpected" ]; then
            echo "Unexpected tracked file changes:"
            echo "$unexpected"
            exit 1
          fi

      - name: Build canonical run SHA-256 manifest
        run: |
          sha256sum \
            workloads/nonlinear_multitask_workload_v1.json \
            validate_nonlinear_multitask_workload.py \
            run_nonlinear_multitask_convergence.py \
            adapters/common_nonlinear_domain.py \
            adapters/common_nonlinear_problem.py \
            adapters/common_convergence_contract.py \
            adapters/common_thermal_ceiling.py \
            adapters/binary_synchronous_adapter.py \
            adapters/binary_clock_gated_adapter.py \
            adapters/direct_ternary_adapter.py \
            adapters/frp_v1_7_0_adapter.py \
            results/reference_nonlinear_multitask_seed_76.json \
            .qualification/reference_nonlinear_multitask_seed_76_repeat.json \
            .qualification/nonlinear_multitask_runner_self_test.json \
            .qualification/nonlinear_multitask_execution_chain_self_tests.json \
            > .qualification/nonlinear_multitask_canonical_run_sha256_manifest.txt

          cat .qualification/nonlinear_multitask_canonical_run_sha256_manifest.txt

      - name: Commit canonical nonlinear multitask result to main
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add --force \
            results/reference_nonlinear_multitask_seed_76.json

          if git diff --cached --quiet; then
            echo "Canonical nonlinear multitask result is already current."
            exit 0
          fi

          git commit \
            -m "[skip actions] Record canonical nonlinear multitask convergence result"

          git push origin HEAD:main
