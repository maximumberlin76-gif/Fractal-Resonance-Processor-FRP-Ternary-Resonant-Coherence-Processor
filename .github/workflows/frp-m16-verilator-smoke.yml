name: FRP M16 Verilator Smoke

on:
  push:
    paths:
      - "rtl/m16/**"
      - ".github/workflows/frp-m16-verilator-smoke.yml"
      - ".github/workflows/frp-m16-rtl-artifact-boundary.yml"
      - "tests/test_m16_rtl_artifact_manifest.py"
      - "docs/m16_external_simulator_execution_plan.md"
      - "docs/m16_qualification_manifest.md"
      - "docs/m16_qualification_index.md"
      - "docs/m16_rtl_artifact_boundary_qualification.md"
  pull_request:
    paths:
      - "rtl/m16/**"
      - ".github/workflows/frp-m16-verilator-smoke.yml"
      - ".github/workflows/frp-m16-rtl-artifact-boundary.yml"
      - "tests/test_m16_rtl_artifact_manifest.py"
      - "docs/m16_external_simulator_execution_plan.md"
      - "docs/m16_qualification_manifest.md"
      - "docs/m16_qualification_index.md"
      - "docs/m16_rtl_artifact_boundary_qualification.md"
  workflow_dispatch:

jobs:
  m16-verilator-smoke:
    name: M16 Verilator smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator
          verilator --version

      - name: Build M16 deterministic RTL testbench
        run: |
          set -o pipefail
          verilator \
            --sv \
            --timing \
            --assert \
            --binary \
            --error-limit 5 \
            -Irtl/m16 \
            rtl/m16/frp_m16_tb.sv \
            2>&1 | tee m16_verilator_build.log

      - name: Show first Verilator build errors
        if: failure()
        run: |
          echo "==== FIRST VERILATOR BUILD ERRORS ===="
          grep -n "%Error" m16_verilator_build.log | head -20 || true
          echo "==== FIRST 160 BUILD LOG LINES ===="
          sed -n '1,160p' m16_verilator_build.log || true

      - name: Run M16 deterministic RTL testbench
        run: |
          ./obj_dir/Vfrp_m16_tb | tee m16_verilator_smoke.log

      - name: Validate completion marker
        run: |
          grep -F "FRP M16 deterministic RTL testbench completed." m16_verilator_smoke.log

      - name: Validate zero-event counters
        run: |
          grep -Eq "actual_direct_events[ =]+0" m16_verilator_smoke.log
          grep -Eq "reserved_state_events[ =]+0" m16_verilator_smoke.log
          grep -Eq "queue_overflow_events[ =]+0" m16_verilator_smoke.log

      - name: Upload M16 Verilator build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frp-m16-verilator-build-log
          path: m16_verilator_build.log
          if-no-files-found: ignore

      - name: Upload M16 Verilator smoke transcript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frp-m16-verilator-smoke-transcript
          path: m16_verilator_smoke.log
          if-no-files-found: ignore
