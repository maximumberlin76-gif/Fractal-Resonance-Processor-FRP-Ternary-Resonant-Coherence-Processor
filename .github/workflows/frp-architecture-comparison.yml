name: FRP Comparative Architecture Benchmark

on:
  push:
    branches:
      - main
    paths:
      - "frp_prototype_v1_7_0.py"
      - "benchmarks/architecture_comparison/**"
      - ".github/workflows/frp-architecture-comparison.yml"

  pull_request:
    paths:
      - "frp_prototype_v1_7_0.py"
      - "benchmarks/architecture_comparison/**"
      - ".github/workflows/frp-architecture-comparison.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frp-architecture-comparison-${{ github.ref }}
  cancel-in-progress: false

jobs:
  architecture-comparison:
    name: Comparative Architecture Qualification

    runs-on: ubuntu-latest

    timeout-minutes: 30

    env:
      PYTHONHASHSEED: "0"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      LC_ALL: C.UTF-8
      TZ: UTC

    defaults:
      run:
        shell: bash
        working-directory: benchmarks/architecture_comparison

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Show qualification environment
        run: |
          python --version
          pwd
          find . -maxdepth 2 -type f | sort

      - name: Compile benchmark and FRP reference files
        run: |
          python -m py_compile \
            common_workload.py \
            common_cost_model.py \
            common_thermal_model.py \
            binary_synchronous_reference.py \
            binary_clock_gated_reference.py \
            direct_ternary_reference.py \
            frp_v1_7_0_adapter.py \
            run_architecture_comparison.py \
            ../../frp_prototype_v1_7_0.py

      - name: Create qualification directories
        run: |
          mkdir -p artifacts
          mkdir -p results
          mkdir -p .qualification

      - name: Validate canonical workload profile
        run: |
          python common_workload.py \
            --profile profiles/workload_profile_v1.json \
            --write artifacts/workload_seed_76.json \
            --output text

      - name: Validate canonical normalized cost profile
        run: |
          python common_cost_model.py \
            --profile profiles/normalized_cost_profile_v1.json \
            --output text

      - name: Validate canonical thermal proxy profile
        run: |
          python common_thermal_model.py \
            --profile profiles/thermal_proxy_profile_v1.json \
            --output text

      - name: Run common workload self-test
        run: |
          python common_workload.py \
            --self-test \
            --output text

      - name: Run common cost-model self-test
        run: |
          python common_cost_model.py \
            --self-test \
            --output text

      - name: Run common thermal-model self-test
        run: |
          python common_thermal_model.py \
            --self-test \
            --output text

      - name: Run Binary Synchronous Reference self-test
        run: |
          python binary_synchronous_reference.py \
            --self-test \
            --output text

      - name: Run Binary Clock-Gated Reference self-test
        run: |
          python binary_clock_gated_reference.py \
            --self-test \
            --output text

      - name: Run Direct Ternary Reference self-test
        run: |
          python direct_ternary_reference.py \
            --self-test \
            --output text

      - name: Run FRP v1.7.0 quantized shadow adapter self-test
        run: |
          python frp_v1_7_0_adapter.py \
            --self-test \
            --output text

      - name: Run end-to-end comparison self-test
        run: |
          python run_architecture_comparison.py \
            --self-test \
            --output text

      - name: Generate canonical comparison package
        run: |
          python run_architecture_comparison.py \
            --workload-profile profiles/workload_profile_v1.json \
            --cost-profile profiles/normalized_cost_profile_v1.json \
            --thermal-profile profiles/thermal_proxy_profile_v1.json \
            --frp-scheduler "7/1" \
            --write results/reference_comparison_seed_76.json \
            --output text

      - name: Regenerate comparison package independently
        run: |
          python run_architecture_comparison.py \
            --workload-profile profiles/workload_profile_v1.json \
            --cost-profile profiles/normalized_cost_profile_v1.json \
            --thermal-profile profiles/thermal_proxy_profile_v1.json \
            --frp-scheduler "7/1" \
            --write .qualification/reference_comparison_seed_76_repeat.json \
            --output text

      - name: Verify byte-identical deterministic regeneration
        run: |
          cmp \
            results/reference_comparison_seed_76.json \
            .qualification/reference_comparison_seed_76_repeat.json

      - name: Verify comparison package integrity and qualification contract
        run: |
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path

          package_path = Path(
              "results/reference_comparison_seed_76.json"
          )

          package = json.loads(
              package_path.read_text(
                  encoding="utf-8"
              )
          )

          expected_architecture_order = [
              "binary_synchronous_reference",
              "binary_clock_gated_reference",
              "direct_ternary_reference",
              "frp_v1_7_0_quantized_shadow",
          ]

          expected_workload_sha256 = (
              "8386174d0a4751af26cc68bf46a5494c"
              "f0e58a3c14fc59ff46830a21645f0562"
          )

          expected_cost_profile_sha256 = (
              "4c4a470150ecc182c9a51eaefc0bcba0"
              "353e71160d16c6c6afd28a39c23b05bc"
          )

          expected_thermal_profile_sha256 = (
              "8cc2992f5699c47c88e81c17a4a5f0c8"
              "ff5bb7a5b32ebf73ab0e5a0f9c5494c8"
          )

          assert (
              package["schema"]
              == "frp.benchmark.architecture_comparison.v1"
          )

          assert (
              package["frp_reference_version"]
              == "1.7.0"
          )

          assert (
              package["frp_scheduler"]
              == "7/1"
          )

          assert (
              package["architecture_order"]
              == expected_architecture_order
          )

          assert (
              package["workload_sha256"]
              == expected_workload_sha256
          )

          assert (
              package["cost_profile_sha256"]
              == expected_cost_profile_sha256
          )

          assert (
              package["thermal_profile_sha256"]
              == expected_thermal_profile_sha256
          )

          assert (
              package["integrity"]["status"]
              == "PASS"
          )

          assert all(
              package["integrity"]["checks"].values()
          )

          assert (
              package["qualification"]["policy"]
              == "integrity_only_no_winner_assertions"
          )

          assert (
              package["qualification"]["status"]
              == "PASS"
          )

          assert all(
              package["qualification"]["checks"].values()
          )

          assert (
              package["qualification"]["winner_assertions"]
              == []
          )

          matrix = package["comparison_matrix"]

          assert (
              [
                  row["architecture_id"]
                  for row in matrix
              ]
              == expected_architecture_order
          )

          assert len(matrix) == 4

          assert all(
              row["semantic_output_match"]
              == 1.0
              for row in matrix
          )

          assert all(
              row["semantic_completion_ratio"]
              == 1.0
              for row in matrix
          )

          architectures = {
              row["architecture_id"]: row
              for row in package["architectures"]
          }

          frp = architectures[
              "frp_v1_7_0_quantized_shadow"
          ]

          specific = frp[
              "architecture_specific_metrics"
          ]

          assert (
              specific["actual_direct_events"]
              == 0
          )

          assert (
              specific["reserved_state_events"]
              == 0
          )

          assert (
              specific["queue_overflow_events"]
              == 0
          )

          assert (
              specific["pending_route_count_final"]
              == 0
          )

          assert (
              specific["requested_direct_events"]
              == specific["prevented_direct_events"]
          )

          assert (
              specific["neutral_insertions"]
              == specific["neutral_routed_events"]
          )

          assert (
              specific["fixed_point_topology_sum_exact"]
              is True
          )

          assert (
              specific["fixed_point_thermal_sum_exact"]
              is True
          )

          recorded_digest = package[
              "comparison_package_sha256"
          ]

          digest_payload = dict(
              package
          )

          del digest_payload[
              "comparison_package_sha256"
          ]

          canonical = json.dumps(
              digest_payload,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
              allow_nan=False,
          ).encode("utf-8")

          recomputed_digest = hashlib.sha256(
              canonical
          ).hexdigest()

          assert (
              recorded_digest
              == recomputed_digest
          )

          assert len(
              recorded_digest
          ) == 64

          print(
              "comparison package integrity: PASS"
          )

          print(
              "comparison_package_sha256="
              f"{recorded_digest}"
          )
          PY

      - name: Build SHA-256 qualification manifest
        run: |
          sha256sum \
            artifacts/workload_seed_76.json \
            profiles/workload_profile_v1.json \
            profiles/normalized_cost_profile_v1.json \
            profiles/thermal_proxy_profile_v1.json \
            results/reference_comparison_seed_76.json \
            .qualification/reference_comparison_seed_76_repeat.json \
            > artifacts/sha256_manifest.txt

          cat artifacts/sha256_manifest.txt

      - name: Upload comparative qualification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frp-architecture-comparison-seed-76
          path: |
            benchmarks/architecture_comparison/artifacts/
            benchmarks/architecture_comparison/results/reference_comparison_seed_76.json
            benchmarks/architecture_comparison/.qualification/reference_comparison_seed_76_repeat.json
          if-no-files-found: error
          retention-days: 90
