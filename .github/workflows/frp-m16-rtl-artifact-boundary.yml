name: FRP M16 RTL Artifact Boundary

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frp-m16-rtl-artifact-boundary-${{ github.ref }}
  cancel-in-progress: false

jobs:
  m16-rtl-qualification:
    name: M16 RTL Architecture Qualification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      M16_BUILD_DIR: /tmp/frp_m16_obj
      M16_BUILD_LOG: /tmp/frp_m16_build.log
      M16_EXECUTION_LOG: /tmp/frp_m16_execution.log
      M16_TOOLCHAIN_LOG: /tmp/frp_m16_toolchain.log
      M16_METADATA: /tmp/frp_m16_qualification.txt
      M16_SOURCE_HASHES: /tmp/frp_m16_sources.sha256

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify M16 artifact boundary
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          rtl_directory = Path("rtl/m16")

          expected_systemverilog = {
              "frp_m16_pkg.sv",
              "frp_m16_scheduler.sv",
              "frp_m16_request_lanes.sv",
              "frp_m16_pending_routes.sv",
              "frp_m16_active_neutral.sv",
              "frp_m16_capacity_guard.sv",
              "frp_m16_state_update.sv",
              "frp_m16_core.sv",
              "frp_m16_assertions.sv",
              "frp_m16_tb.sv",
          }

          expected_documentation = {
              "README.md",
              "ARTIFACTS.md",
              "SIMULATION.md",
              "SIMULATION_TRANSCRIPT.md",
              "CLOSURE.md",
          }

          actual_systemverilog = {
              path.name
              for path in rtl_directory.glob("*.sv")
              if path.is_file()
          }

          missing_systemverilog = sorted(
              expected_systemverilog - actual_systemverilog
          )

          unexpected_systemverilog = sorted(
              actual_systemverilog - expected_systemverilog
          )

          missing_documentation = sorted(
              name
              for name in expected_documentation
              if not (rtl_directory / name).is_file()
          )

          empty_artifacts = sorted(
              path.name
              for path in rtl_directory.iterdir()
              if path.is_file()
              and path.name in (
                  expected_systemverilog
                  | expected_documentation
              )
              and path.stat().st_size == 0
          )

          if missing_systemverilog:
              raise SystemExit(
                  "Missing M16 SystemVerilog artifacts:\n"
                  + "\n".join(
                      f"- {name}"
                      for name in missing_systemverilog
                  )
              )

          if unexpected_systemverilog:
              raise SystemExit(
                  "Unexpected M16 SystemVerilog artifacts:\n"
                  + "\n".join(
                      f"- {name}"
                      for name in unexpected_systemverilog
                  )
              )

          if missing_documentation:
              raise SystemExit(
                  "Missing M16 documentation artifacts:\n"
                  + "\n".join(
                      f"- {name}"
                      for name in missing_documentation
                  )
              )

          if empty_artifacts:
              raise SystemExit(
                  "Empty M16 artifacts:\n"
                  + "\n".join(
                      f"- {name}"
                      for name in empty_artifacts
                  )
              )

          print("M16 SystemVerilog artifacts: 10")
          print("M16 RTL documentation artifacts: 5")
          print("M16 artifact boundary: complete")
          PY

      - name: Verify obsolete workflows are absent
        shell: bash
        run: |
          set -euo pipefail

          test ! -e \
            .github/workflows/frp-m16-verilator-smoke.yml

          test ! -e \
            .github/workflows/frp-m16-verilator-clean-smoke.yml

      - name: Prepare isolated simulation paths
        shell: bash
        run: |
          set -euo pipefail

          rm -rf /tmp/frp_m16_obj
          rm -f /tmp/frp_m16_build.log
          rm -f /tmp/frp_m16_execution.log
          rm -f /tmp/frp_m16_toolchain.log
          rm -f /tmp/frp_m16_qualification.txt
          rm -f /tmp/frp_m16_sources.sha256

          mkdir -p /tmp/frp_m16_obj

      - name: Install Verilator toolchain
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install --yes verilator g++

          {
            echo "repository=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "execution_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            verilator --version
            g++ --version | head -n 1
          } | tee /tmp/frp_m16_toolchain.log

      - name: Record M16 source hashes
        shell: bash
        run: |
          set -euo pipefail

          sha256sum rtl/m16/*.sv \
            | sort \
            | tee /tmp/frp_m16_sources.sha256

      - name: Build integrated M16 RTL testbench
        shell: bash
        run: |
          set -euo pipefail

          verilator \
            --sv \
            --timing \
            --assert \
            --binary \
            --top-module frp_m16_tb \
            -Irtl/m16 \
            --Mdir /tmp/frp_m16_obj \
            rtl/m16/frp_m16_tb.sv \
            2>&1 | tee /tmp/frp_m16_build.log

          test -x /tmp/frp_m16_obj/Vfrp_m16_tb

      - name: Execute M16 architectural testbench
        shell: bash
        run: |
          set -euo pipefail

          /tmp/frp_m16_obj/Vfrp_m16_tb \
            2>&1 | tee /tmp/frp_m16_execution.log

      - name: Validate terminal execution markers
        shell: bash
        run: |
          set -euo pipefail

          grep -Fqx \
            "FRP M16 deterministic RTL testbench completed." \
            /tmp/frp_m16_execution.log

          grep -Fqx \
            "CELLS=8 REQUEST_LANES=2" \
            /tmp/frp_m16_execution.log

          grep -Fqx \
            "ticks_recorded=16" \
            /tmp/frp_m16_execution.log

          grep -Fqx \
            "actual_direct_events=0" \
            /tmp/frp_m16_execution.log

          grep -Fqx \
            "reserved_state_events=0" \
            /tmp/frp_m16_execution.log

          grep -Fqx \
            "queue_overflow_events=0" \
            /tmp/frp_m16_execution.log

      - name: Record qualification result
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "FRP M16 RTL Artifact Boundary"
            echo "repository=${GITHUB_REPOSITORY}"
            echo "commit=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "result=PASS"
            echo "systemverilog_artifacts=10"
            echo "rtl_documentation_artifacts=5"
            echo "top_module=frp_m16_tb"
            echo "cells=8"
            echo "request_lanes=2"
            echo "free_ticks=16"
            echo "balance_ticks=56"
            echo "commit_ticks=8"
            echo "excite_ticks=2"
            echo "neutralize_ticks=14"
            echo "actual_direct_events=0"
            echo "reserved_state_events=0"
            echo "queue_overflow_events=0"
          } | tee /tmp/frp_m16_qualification.txt

      - name: Verify repository remains unchanged
        shell: bash
        run: |
          set -euo pipefail

          git diff --exit-code

          if [[ -n "$(git status --porcelain)" ]]; then
            git status --short
            exit 1
          fi

          test ! -e obj_dir
          test ! -e rtl/m16/obj_dir

      - name: Upload M16 qualification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frp-m16-rtl-qualification-${{ github.run_number }}
          path: |
            /tmp/frp_m16_toolchain.log
            /tmp/frp_m16_sources.sha256
            /tmp/frp_m16_build.log
            /tmp/frp_m16_execution.log
            /tmp/frp_m16_qualification.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Publish qualification summary
        if: always()
        shell: bash
        run: |
          {
            echo "## FRP M16 RTL Artifact Boundary"
            echo
            echo "- Job result: ${{ job.status }}"
            echo "- SystemVerilog artifacts: 10"
            echo "- RTL documentation artifacts: 5"
            echo "- Top module: frp_m16_tb"
            echo "- Scheduler modes: free, 7/1, 1/7"
            echo "- Active-neutral routes: -1 → 0 → +1 and +1 → 0 → -1"
            echo "- Build directory: /tmp/frp_m16_obj"
            echo "- Execution log: frp_m16_execution.log"
          } >> "${GITHUB_STEP_SUMMARY}"
